<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-itunes-app" content="app-id=1515534152" />
    <meta
      name="description"
      content="Lahjoitukset auttavat kehittämään puheentunnistusta, joka ymmärtää kaikenlaista suomea."
    />
    <!-- Facebook share -->
    <meta property="og:title" content="Lahjoita puhetta" />
    <meta
      property="og:description"
      content="Lahjoitukset auttavat kehittämään puheentunnistusta, joka ymmärtää kaikenlaista suomea."
      />
    <meta
      property="og:image"
      content="https://lahjoitapuhetta.fi/share-placeholder.png"
    />
    <meta property="og:url" content="https://lahjoitapuhetta.fi" />
    <!-- Twitter share -->
    <meta name="twitter:title" content="Lahjoita puhetta" />
    <meta
      name="twitter:description"
      content="Lahjoitukset auttavat kehittämään puheentunnistusta, joka ymmärtää kaikenlaista suomea."
    />
    <meta
      name="twitter:image"
      content="https://lahjoitapuhetta.fi/share-placeholder.png"
      />
    <script language="JavaScript">
      var urlParams = new URLSearchParams(window.location.search.replace('/', ''));
      if (urlParams.get("lang") === "sv") {
	  document.querySelector('meta[property="og:title"]').setAttribute("content", "Donera prat");
	  document.querySelector('meta[property="og:description"]').setAttribute("content", "Med hjälp av alla donationer kan vi till exempel utveckla en taligenkänning som förstår finlandssvenska - med språkets alla dialekter och uttal.");
	  document.querySelector('meta[property="og:url"]').setAttribute("content", "https://doneraprat.fi");
	  document.querySelector('meta[property="twitter:title"]').setAttribute("content", "Donera prat");
	  document.querySelector('meta[property="twitter:description"]').setAttribute("content", "Med hjälp av alla donationer kan vi till exempel utveckla en taligenkänning som förstår finlandssvenska - med språkets alla dialekter och uttal.");
      }
    </script>
    
    <!-- Icons -->
    <link
      rel="apple-touch-icon"
      href="https://lahjoitapuhetta.fi/logo192.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://lahjoitapuhetta.fi/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://lahjoitapuhetta.fi/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://lahjoitapuhetta.fi/favicon-16x16.png"
    />
    <link
      rel="mask-icon"
      href="https://lahjoitapuhetta.fi/safari-pinned-tab.svg"

    />
