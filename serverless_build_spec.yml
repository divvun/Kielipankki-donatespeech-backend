version: 0.2

phases:
  install:
    runtime-versions:
      docker: 18
      nodejs: 14
      python: 3.10
    commands:
      - npm install -g serverless
      - npm install -g aws-cdk@1.130.0
  pre_build:
    commands:
      - docker login -u $DOCKERHUB_USER -p $DOCKERHUB_PASSWORD
  build:
    commands:
      - cd vake-ui
      - npm install
      - REACT_APP_STAGE=$ENV npm run build
      - mv build dist
      - cd ../cdk
      - npm install
      - npm run build
      - echo Env variables Env $ENV branch $BRANCH
      - cdk bootstrap
      - cdk deploy VakeBackendCI VakeBackendResources VakeWAF VakeStaticSite --require-approval=never
      - cd ../vake-backend
      - npm install
      - sls create_domain --stage $ENV
      - sls deploy --stage $ENV
